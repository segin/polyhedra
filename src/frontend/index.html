<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polyhedra</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>"
    />
    <!-- Load JSZip as global script from our server -->
    <script src="/modules/jszip.js"></script>
    <!-- Load loglevel as global script -->
    <script src="/modules/loglevel.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "/modules/three.js",
          "three/examples/jsm/controls/OrbitControls.js": "/modules/OrbitControls.js",
          "three/examples/jsm/controls/TransformControls.js": "/modules/TransformControls.js",
          "dat.gui": "/modules/dat.gui.js",
          "loglevel": "/modules/loglevel.js",
          "cannon-es": "/modules/cannon-es.js",
          "three-csg-ts": "/modules/three-csg-ts.js",
          "three/examples/jsm/geometries/TeapotGeometry.js": "/modules/TeapotGeometry.js",
          "three/examples/jsm/loaders/FontLoader.js": "/modules/FontLoader.js",
          "three/examples/jsm/geometries/TextGeometry.js": "/modules/TextGeometry.js",
          "three/examples/jsm/loaders/OBJLoader.js": "/modules/OBJLoader.js",
          "three/examples/jsm/loaders/GLTFLoader.js": "/modules/GLTFLoader.js",
          "@tweenjs/tween.js": "/modules/tween.js"
        }
      }
    </script>
  </head>
  <body>
    <!-- Top Menu Bar -->
    <div id="menubar">
      <div class="menu-brand">Polyhedra</div>
      <div class="menu-item">
        File
        <div class="menu-dropdown">
          <a href="#" id="menu-file-load" title="Load scene from file">Open Scene</a>
          <a href="#" id="menu-file-save" title="Save current scene to file">Save Scene</a>
          <a href="#" id="menu-file-import">Import Model (OBJ/GLTF)</a>
        </div>
      </div>
      <div class="menu-item">
        Edit
        <div class="menu-dropdown">
          <a href="#" id="menu-edit-undo">Undo</a>
          <a href="#" id="menu-edit-redo">Redo</a>
          <div class="menu-divider"></div>
          <a href="#" id="menu-edit-delete">Delete Selected</a>
          <a href="#" id="menu-edit-duplicate">Duplicate Selected</a>
        </div>
      </div>
      <div class="menu-item">
        Add
        <div class="menu-dropdown">
          <a href="#" id="menu-add-box">Box</a>
          <a href="#" id="menu-add-sphere">Sphere</a>
          <a href="#" id="menu-add-cylinder">Cylinder</a>
          <a href="#" id="menu-add-cone">Cone</a>
          <a href="#" id="menu-add-torus">Torus</a>
          <div class="menu-divider"></div>
          <a href="#" id="menu-add-plane">Plane</a>
          <a href="#" id="menu-add-teapot">Teapot</a>
        </div>
      </div>
      <div class="menu-item">
        View
        <div class="menu-dropdown">
          <a href="#" id="menu-view-fullscreen" title="Toggle Fullscreen">Fullscreen</a>
        </div>
      </div>
    </div>

    <!-- Main Workspace Area -->
    <div id="workspace">
      <!-- Left Toolbar -->
      <div id="toolbar">
        <!-- Tools will be injected here by main.js -->
      </div>
      
      <!-- Center Canvas Area -->
      <div id="viewport">
        <canvas id="c" aria-label="3D Scene Viewer" title="3D Scene Viewer" role="region"></canvas>
      </div>
      
      <!-- Right Sidebar (Outliner & Properties) -->
      <div id="sidebar">
        <div id="scene-graph-panel">
          <h3>Scene Graph</h3>
          <ul id="objects-list"></ul>
        </div>
        <div id="properties-panel">
          <!-- dat.gui will be appended here -->
        </div>
      </div>
    </div>

    <input type="file" id="file-input" accept=".polyhedra" style="display: none" />
    <input type="file" id="model-import-input" accept=".obj,.glb,.gltf" style="display: none" />
    <script type="module">
      import { App } from './main.js';
      new App();
    </script>
  </body>
</html>
